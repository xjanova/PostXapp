name: Init Release Keystore

# One-off workflow that generates a stable release signing keystore
# and commits it to the repo. After this runs once, every subsequent
# CI build of android-release.yml will sign APKs with the same key,
# so users can install updates without "package conflict" errors.
#
# Trigger manually from the Actions tab once. After it runs and commits
# the keystore, you never need to run it again.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN with write permission so we can
          # push the generated keystore back to main.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Check if release keystore already exists
        id: check
        run: |
          if [ -f mobile/android/app/release.keystore ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release keystore already exists. Skipping generation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release keystore
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          keytool -genkeypair -v \
            -keystore mobile/android/app/release.keystore \
            -storetype PKCS12 \
            -storepass postxapp \
            -keypass postxapp \
            -alias postxapp \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=PostXApp, O=xman studio, C=TH"

          echo "=== Keystore fingerprint ==="
          keytool -list -v \
            -keystore mobile/android/app/release.keystore \
            -storepass postxapp \
            -alias postxapp | grep -E "SHA1|SHA-256|Valid from"

      - name: Commit and push keystore
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile/android/app/release.keystore
          git commit -m "Add stable release signing keystore [skip ci]"
          git push origin HEAD:main
