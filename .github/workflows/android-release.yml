name: Android Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build APK (release)
        working-directory: mobile
        run: flutter build apk --release

      - name: Build App Bundle (release)
        working-directory: mobile
        run: flutter build appbundle --release

      - name: Rename artifacts
        run: |
          mkdir -p artifacts
          cp mobile/build/app/outputs/flutter-apk/app-release.apk artifacts/PostXApp-${{ github.ref_name }}.apk
          cp mobile/build/app/outputs/bundle/release/app-release.aab artifacts/PostXApp-${{ github.ref_name }}.aab

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PostXApp-${{ github.ref_name }}.apk
            artifacts/PostXApp-${{ github.ref_name }}.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
