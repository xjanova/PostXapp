appId: com.xmanstudio.postxapp
productName: PostX App
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
publish:
  provider: github
  owner: xjanova
  repo: PostXapp
  releaseType: release
win:
  executableName: PostXApp
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: PostX App
  uninstallDisplayName: PostX App
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: PostX App needs access to save posts.
    - NSDownloadsFolderUsageDescription: PostX App needs access to save exports.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
linux:
  target:
    - target: AppImage
      arch:
        - x64
  maintainer: xman studio
  category: Utility
